<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muse Wave 音乐电台</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --surface-hover: #f5f2ee;
    --text: #2c2c2c;
    --text-muted: #8a8580;
    --accent: #d4845a;
    --accent-light: #f0d6c2;
    --accent-glow: rgba(212, 132, 90, 0.15);
    --border: #e8e4df;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .app {
   max-width: 520px;
   width: 100%;
   display: flex;
    position: relative;
    z-index: 1;
   flex-direction: column;
   gap: 16px;
 }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 4px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), #e8a87c);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 18px;
    flex-shrink: 0;
  }
  .brand-name {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .brand-name span {
    color: var(--accent);
  }
   .upload-zone {
     border: 2px dashed var(--border);
     border-radius: var(--radius);
     padding: 28px 20px;
     text-align: center;
     cursor: pointer;
     transition: border-color 0.2s, background 0.2s;
     background: var(--surface);
   }
   .upload-zone:hover, .upload-zone.drag-over {
     border-color: var(--accent);
     background: var(--accent-glow);
   }
   .upload-zone-icon {
     font-size: 28px;
     color: var(--accent);
     margin-bottom: 6px;
   }
   .upload-zone-text {
     font-size: 14px;
     color: var(--text-muted);
   }
   .upload-zone-text strong {
     color: var(--accent);
     cursor: pointer;
   }
   .upload-zone-hint {
     font-size: 11px;
     color: var(--text-muted);
     margin-top: 4px;
   }
   .file-item {
     display: flex;
     align-items: center;
     gap: 10px;
     padding: 10px 16px;
     cursor: pointer;
     transition: background 0.15s;
   }
   .file-item:hover {
     background: var(--surface-hover);
   }
   .file-item.active {
     background: var(--accent-glow);
   }
   .file-item .file-icon {
     flex-shrink: 0;
     width: 36px;
     height: 36px;
     border-radius: 6px;
     background: var(--surface-hover);
     display: flex;
     align-items: center;
     justify-content: center;
     font-size: 16px;
     color: var(--accent);
   }
   .file-item .file-info {
     flex: 1;
     min-width: 0;
   }
   .file-item .file-name {
     font-size: 14px;
     font-weight: 500;
     white-space: nowrap;
     overflow: hidden;
     text-overflow: ellipsis;
   }
   .file-item .file-meta {
     font-size: 11px;
     color: var(--text-muted);
   }
  .file-item .file-del {
    border: none;
    background: transparent;
     color: var(--text-muted);
    cursor: pointer;
     font-size: 14px;
    padding: 2px 6px;
    border-radius: 4px;
     opacity: 0;
     transition: opacity 0.15s, color 0.15s;
     flex-shrink: 0;
   }
   .file-item:hover .file-del {
     opacity: 1;
   }
   .file-item .file-del:hover {
     color: #e05050;
   }
   .storage-bar {
     display: flex;
     justify-content: space-between;
     align-items: center;
     padding: 8px 16px 10px;
     font-size: 11px;
     color: var(--text-muted);
     border-top: 1px solid var(--border);
   }
   .empty-hint {
     text-align: center;
     padding: 40px 20px;
     font-size: 14px;
     color: var(--text-muted);
     line-height: 1.8;
   }
   .empty-hint .big-icon {
     font-size: 36px;
     display: block;
     margin-bottom: 8px;
   }  .pl-item {
     display: flex;
     align-items: center;
     gap: 12px;
     padding: 10px 16px;
     cursor: pointer;
     transition: background 0.15s;
   }
   .pl-item:hover {
     background: var(--surface-hover);
   }
   .pl-item.active {
     background: var(--accent-glow);
   }
   .pl-item .pl-info {
     flex: 1;
     min-width: 0;
   }
   .pl-item .pl-title {
     font-size: 14px;
     font-weight: 500;
     white-space: nowrap;
     overflow: hidden;
     text-overflow: ellipsis;
   }
   .pl-item .pl-artist {
     font-size: 12px;
     color: var(--text-muted);
     white-space: nowrap;
     overflow: hidden;
     text-overflow: ellipsis;
   }
   .pl-item .pl-duration {
     font-size: 12px;
     color: var(--text-muted);
     flex-shrink: 0;
  }
 .now-playing {
    background: linear-gradient(145deg, #faf6f0 0%, #f0e8de 100%);
   border-radius: var(--radius);
    box-shadow: var(--shadow), 0 4px 20px rgba(160, 120, 90, 0.12);
   position: relative;
   overflow: hidden;
   padding: 0;
 }
  .now-playing::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #e8a87c, var(--accent-light));
    z-index: 5;
  }
 #waveCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 0;
  }
  .np-overlay {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 60px 24px 30px;
    min-height: 240px;
  }
  .np-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .np-track {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    line-height: 1.3;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .np-artist {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 0;
  }
  .np-controls-area {
    position: relative;
    z-index: 3;
    padding: 8px 24px 24px;
  }
 .controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .btn {
   border: none;
   background: var(--surface-hover);
    filter: url(#handdrawn);
   border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    font-size: 18px;
    transition: background 0.2s, transform 0.15s;
  }
  .btn:hover {
    background: var(--border);
  }
  .btn:active {
    transform: scale(0.93);
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 52px;
    height: 52px;
    font-size: 22px;
  }
  .btn-primary:hover {
    background: #c4754f;
  }
  .progress-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s linear;
  }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
  }
  .volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .volume-row span {
    font-size: 14px;
    color: var(--text-muted);
  }
  .volume-slider {
    flex: 1;
    height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border);
    border-radius: 3px;
    outline: none;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    cursor: pointer;
  }
  .playlist {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 0;
  }
  .pl-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px 12px;
    font-size: 13px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .pl-header strong {
    color: var(--text);
    font-weight: 600;
  }
  .pl-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .pl-item:hover {
    background: var(--surface-hover);
  }
  .pl-item.active {
    border-left-color: var(--accent);
    background: var(--accent-glow);
  }
  .pl-index {
    width: 20px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
    flex-shrink: 0;
  }
  .pl-info {
    flex: 1;
    min-width: 0;
  }
  .pl-title {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pl-title small {
    font-weight: 400;
    color: var(--text-muted);
    font-size: 12px;
    margin-left: 6px;
  }
  .pl-artist {
    font-size: 12px;
    color: var(--text-muted);
  }
 .pl-duration {
   font-size: 12px;
   color: var(--text-muted);
   flex-shrink: 0;
}
  .entry-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    z-index: 10000;
    background: linear-gradient(135deg, #0a1628 0%, #1a3c6e 35%, #1a7a9a 65%, #0d4f6b 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.7s ease, transform 0.7s ease;
    overflow: hidden;
  }
  .entry-screen.hidden {
    opacity: 0;
    transform: scale(1.08);
    pointer-events: none;
  }
  .entry-screen::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(ellipse at 30% 50%, rgba(100,200,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(50,150,220,0.06) 0%, transparent 50%);
    animation: entryAmbient 10s ease-in-out infinite alternate;
  }
  @keyframes entryAmbient {
    0% { transform: translate(0,0) rotate(0deg); }
    100% { transform: translate(-30px,20px) rotate(3deg); }
  }
  .entry-content {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .entry-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(100,200,255,0.2), rgba(50,150,220,0.1));
    border: 2px solid rgba(100,200,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: rgba(255,255,255,0.9);
    margin-bottom: 16px;
    animation: entryPulse 3s ease-in-out infinite;
    box-shadow: 0 0 40px rgba(100,200,255,0.15);
  }
  @keyframes entryPulse {
    0%, 100% { box-shadow: 0 0 40px rgba(100,200,255,0.15); transform: scale(1); }
    50% { box-shadow: 0 0 60px rgba(100,200,255,0.3); transform: scale(1.03); }
  }
  .entry-title {
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    margin: 0;
  }
  .entry-title span {
    color: #5bc0eb;
  }
  .entry-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin: 0 0 24px;
  }
  .entry-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 48px;
    border: 1px solid rgba(100,200,255,0.4);
    border-radius: 50px;
    background: rgba(100,200,255,0.1);
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    letter-spacing: 2px;
    font-family: var(--font);
  }
  .entry-btn:hover {
    background: rgba(100,200,255,0.2);
    border-color: rgba(100,200,255,0.7);
    box-shadow: 0 0 30px rgba(100,200,255,0.2);
  }
  .entry-btn:active {
    transform: scale(0.97);
  }
  .entry-decoration {
    position: absolute;
    z-index: 1;
    border-radius: 50%;
    opacity: 0.04;
    background: radial-gradient(circle, #5bc0eb, transparent);
  }
  .entry-d1 {
    width: 300px;
    height: 300px;
    top: 10%;
    left: -5%;
  }
  .entry-d2 {
    width: 200px;
    height: 200px;
    bottom: 15%;
    right: -5%;
 }
  .rec-btn {
    padding: 6px 16px;
    border: 1px solid var(--accent);
    border-radius: 20px;
    background: transparent;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font);
    flex-shrink: 0;
  }
  .rec-btn:hover {
    background: var(--accent);
    color: #fff;
  }
  .np-rec-badge {
    display: none;
    font-size: 11px;
    color: #5bc0eb;
    background: rgba(91,192,235,0.15);
    padding: 2px 10px;
    border-radius: 10px;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .np-rec-badge.show {
    display: inline-block;
 }
 .fn-wrap {
   position: fixed;
   top: 0;
   left: 0;
   width: 100%;
  height: 100%;
    z-index: 3;
  pointer-events: none;
  overflow: hidden;
 }
 .fn {
   position: absolute;
   pointer-events: none;
    opacity: 0.22;
   color: var(--accent);
}
 .fn-text {
   position: absolute;
   pointer-events: none;
   color: var(--text-muted);
   font-size: 14px;
   letter-spacing: 1px;
   white-space: nowrap;
   opacity: 0.3;
   font-style: italic;
 }
 @keyframes fnTextFloat {
   0%,100% { transform: translate(0,0) rotate(-4deg); }
   50% { transform: translate(6px,-10px) rotate(1deg); }
 }
 @keyframes fn1 {
    0%,100% { transform: translate(0,0) rotate(-3deg) scale(1); }
    50% { transform: translate(18px,-22px) rotate(12deg) scale(1.08); }
  }
  @keyframes fn2 {
    0%,100% { transform: translate(0,0) rotate(6deg) scale(1); }
    50% { transform: translate(-15px,-18px) rotate(-10deg) scale(0.92); }
  }
  @keyframes fn3 {
    0%,100% { transform: translate(0,0) rotate(-8deg) scale(1); }
    50% { transform: translate(22px,-16px) rotate(18deg) scale(1.05); }
  }
  @keyframes fn4 {
    0%,100% { transform: translate(0,0) rotate(4deg) scale(1); }
    50% { transform: translate(-18px,-25px) rotate(-6deg) scale(0.95); }
  }
  @keyframes fn5 {
    0%,100% { transform: translate(0,0) rotate(-5deg) scale(1); }
    50% { transform: translate(12px,-28px) rotate(8deg) scale(1.1); }
  }
  @keyframes fn6 {
    0%,100% { transform: translate(0,0) rotate(3deg) scale(1); }
    50% { transform: translate(-20px,-14px) rotate(-14deg) scale(0.93); }
 }
  .pause-bar {
    display: inline-block;
    width: 3px;
    height: 18px;
    background: currentColor;
    margin: 0 3px;
    border-radius: 2px;
    vertical-align: middle;
 }
  .play-icon {
    margin-left: 3px;
    display: inline-block;
  }

  

  .search-section {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .search-bar {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 13px;
    outline: none;
    font-family: var(--font);
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }
  .search-btn {
    border: none;
    background: var(--accent);
    color: #fff;
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.15s;
    white-space: nowrap;
  }
  .search-btn:hover { background: #c4754f; }
  .search-results {
    max-height: 360px;
    overflow-y: auto;
  }
  .sr-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: default;
    transition: background 0.12s;
  }
  .sr-item:hover { background: var(--surface-hover); }
  .sr-cover {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface-hover);
  }
  .sr-info {
    flex: 1;
    min-width: 0;
  }
  .sr-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .sr-artist {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sr-play {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 50%;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--accent);
    font-size: 13px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .sr-play:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .sr-play.playing {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .sr-status {
    text-align: center;
    padding: 24px 20px;
    font-size: 13px;
    color: var(--text-muted);
  }

</style>
</head>
<body>
 <div class="fn-wrap">
    <div class="fn" style="top:15%;left:5%;font-size:40px;animation:fn1 9s ease-in-out infinite">&#9835;</div>
    <div class="fn" style="top:8%;right:10%;font-size:28px;animation:fn2 11s ease-in-out infinite 1.2s">&#9834;</div>
    <div class="fn" style="top:35%;left:3%;font-size:26px;animation:fn3 7s ease-in-out infinite 0.6s">&#9833;</div>
    <div class="fn" style="bottom:22%;right:7%;font-size:36px;animation:fn4 10s ease-in-out infinite 2.5s">&#9836;</div>
    <div class="fn" style="bottom:10%;left:18%;font-size:32px;animation:fn5 8s ease-in-out infinite 3.5s">&#9835;</div>
   <div class="fn" style="top:58%;right:4%;font-size:34px;animation:fn6 12s ease-in-out infinite 0.3s">&#9834;</div>
    <div class="fn" style="top:2%;left:42%;font-size:22px;animation:fn2 8.5s ease-in-out infinite 4s">&#9833;</div>
   <div class="fn" style="bottom:30%;right:2%;font-size:28px;animation:fn5 10s ease-in-out infinite 1.8s">&#9835;</div>
    <div class="fn-text" style="bottom:25%;left:2%;font-size:22px;animation:fnTextFloat 10s ease-in-out infinite">别想太多，先听歌吧</div>
 </div>
 <div class="entry-screen" id="entryScreen">
    <div class="entry-decoration entry-d1"></div>
    <div class="entry-decoration entry-d2"></div>
    <div class="entry-content">
      <div class="entry-icon">&#9835;</div>
      <h1 class="entry-title">Muse <span>Wave</span></h1>
      <p class="entry-subtitle">音乐电台</p>
      <button class="entry-btn" id="enterBtn">进入 →</button>
   </div>
 </div>
<div class="app">
 <div class="header">
   <div class="brand">
     <div class="brand-icon">&#9835;</div>
     <div class="brand-name">Muse <span>Wave</span></div>
   </div>
    <button class="rec-btn" id="recBtn">今日推荐</button>
 </div>
 
     <div class="upload-zone" id="uploadZone">
     <input type="file" id="fileInput" accept="audio/*" multiple style="display:none">
     <div class="upload-zone-icon">&#9835;</div>
     <div class="upload-zone-text">拖拽音乐文件到此处，或 <strong>点此选择文件</strong></div>
     <div class="upload-zone-hint">支持 MP3 / WAV / FLAC / OGG / M4A 等格式</div>
   </div>

  <div class="search-section">
    <div class="search-bar">
      <input class="search-input" id="searchInput" placeholder="搜索歌曲或歌手...">
      <button class="search-btn" id="searchBtn">搜索</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

 <div class="now-playing">
    <canvas id="waveCanvas"></canvas>
    <div class="np-overlay">
      <div class="np-rec-badge" id="recBadge">今日推荐</div>
      <div class="np-label">当前播放</div>
      <div class="np-track" id="npTrack">夏日终曲</div>
      <div class="np-artist" id="npArtist">海岸线乐队</div>
    </div>
    <div class="np-controls-area">
      <div class="controls">
        <button class="btn" id="prevBtn" title="上一首">&#9664;&#9664;</button>
        <button class="btn btn-primary" id="playBtn" title="播放 / 暂停"><span class="play-icon">&#9654;</span></button>
       <button class="btn" id="nextBtn" title="下一首">&#9654;&#9654;</button>
        <div class="progress-area">
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>
      </div>
      <div class="volume-row">
        <span>&#128266;</span>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
      </div>
    </div>
 </div>

       <div class="playlist">
    <div class="pl-header">
      <span><strong>音乐库</strong></span>
      <span id="libraryCount">0 首</span>
    </div>
    
    <div id="fileListContainer">
      <div class="empty-hint">
        <span class="big-icon">&#9835;</span>
      </div>
    </div>
    <div class="storage-bar">
      <span></span>
      <span class="storage-used" id="storageInfo"></span>
    </div>
  </div>
</div>
 
 <audio id="audioPlayer"></audio>

<script>

  // === DOM 引用 ===
  const uploadZone = document.getElementById("uploadZone");
  const fileInput = document.getElementById("fileInput");
  const npTrack = document.getElementById("npTrack");
  const npArtist = document.getElementById("npArtist");
  const progressFill = document.getElementById("progressFill");
  const progressBar = document.getElementById("progressBar");
  const currentTimeEl = document.getElementById("currentTime");
  const totalTimeEl = document.getElementById("totalTime");
  const playBtn = document.getElementById("playBtn");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
 const volumeSlider = document.getElementById("volumeSlider");
 const fileListContainer = document.getElementById("fileListContainer");
  const libraryCount = document.getElementById("libraryCount");
  const storageInfo = document.getElementById("storageInfo");
  const audioPlayer = document.getElementById("audioPlayer");

  // === 状态 ===
  let tracks = [];  // { id, name, size, url, dur }
  let currentIndex = -1;
  let isPlaying = false;

  // === IndexedDB ===
  const DB_NAME = "MusicLibraryDB";
  const STORE_NAME = "files";
  let db = null;

  function openDB() {
    return new Promise(function(resolve, reject) {
      if (db) return resolve(db);
      var req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function(e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains(STORE_NAME)) {
          d.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        }
      };
      req.onsuccess = function(e) { db = e.target.result; resolve(db); };
      req.onerror = function() { reject(req.error); };
    });
  }

  function dbAdd(data) {
    return openDB().then(function(d) {
      return new Promise(function(resolve, reject) {
        var tx = d.transaction(STORE_NAME, "readwrite");
        var req = tx.objectStore(STORE_NAME).add(data);
        req.onsuccess = function() { resolve(req.result); };
        req.onerror = function() { reject(req.error); };
      });
    });
  }

  function dbDelete(id) {
    return openDB().then(function(d) {
      return new Promise(function(resolve, reject) {
        var tx = d.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).delete(id);
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function() { reject(tx.error); };
      });
    });
  }

  function dbGetAll() {
    return openDB().then(function(d) {
      return new Promise(function(resolve, reject) {
        var tx = d.transaction(STORE_NAME, "readonly");
        var req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = function() { resolve(req.result); };
        req.onerror = function() { reject(req.error); };
      });
    });
  }

  // === 工具函数 ===
  function fmtSize(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / 1048576).toFixed(1) + " MB";
  }

  function fmtTime(sec) {
    if (!sec || isNaN(sec)) return "0:00";
    var m = Math.floor(sec / 60);
    var s = Math.floor(sec % 60);
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  function stripExt(name) {
    var idx = name.lastIndexOf(".");
    return idx > 0 ? name.substring(0, idx) : name;
  }

  function escapeHtml(str) {
    var d = document.createElement("div");
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  // === 文件处理 ===
  function processFiles(fileList) {
    var pending = [];
    for (var i = 0; i < fileList.length; i++) {
      var f = fileList[i];
      if (!f.type.startsWith("audio/") && !f.name.match(/\.(mp3|wav|flac|ogg|m4a|aac|wma)$/i)) continue;
      pending.push(
        dbAdd({ name: f.name, size: f.size, type: f.type, lastModified: f.lastModified, blob: f })
        .then(function(id) {
          tracks.push({
            id: id,
            name: stripExt(f.name),
            size: f.size,
            url: URL.createObjectURL(f),
            dur: 0
          });
        })
      );
    }
    return Promise.all(pending).then(function() {
      renderFileList();
      if (tracks.length === 1) {
        currentIndex = 0;
        selectTrack(0);
      }
    });
  }

  // === 文件列表渲染 ===
  function renderFileList() {
    if (tracks.length === 0) {
      fileListContainer.innerHTML = "<div class=\"empty-hint\"><span class=\"big-icon\">&#9835;</span>还没有音乐文件<br>将音频文件拖拽到上方区域添加</div>";
      libraryCount.textContent = "0 首";
      storageInfo.textContent = "";
      return;
    }
    var html = "";
    var totalBytes = 0;
    for (var i = 0; i < tracks.length; i++) {
      var t = tracks[i];
      totalBytes += t.size;
      var cls = "file-item" + (i === currentIndex ? " active" : "");
      html += "<div class=\"" + cls + "\" data-idx=\"" + i + "\">";
      html += "<div class=\"file-icon\">&#9835;</div>";
      html += "<div class=\"file-info\"><div class=\"file-name\">" + escapeHtml(t.name) + "</div><div class=\"file-meta\">" + fmtSize(t.size) + "</div></div>";
      html += "<button class=\"file-del\" data-idx=\"" + i + "\" title=\"删除\">&#10005;</button></div>";
    }
    fileListContainer.innerHTML = html;
    libraryCount.textContent = tracks.length + " 首";
    storageInfo.textContent = fmtSize(totalBytes);

    // 事件委托：点击容器根据目标元素分发
    fileListContainer.addEventListener("click", function(e) {
      var target = e.target.closest("[data-idx]");
      if (!target) return;
      var idx = parseInt(target.dataset.idx, 10);
      if (e.target.closest(".file-del")) {
        deleteTrack(idx);
      } else {
        selectTrack(idx);
      }
    });
  }

  // === 播放控制 ===
  function selectTrack(idx) {
    if (idx < 0 || idx >= tracks.length) return;
   currentIndex = idx;
   document.getElementById("recBadge").classList.remove("show");
   var t = tracks[idx];
    npTrack.textContent = t.name;
    npArtist.textContent = fmtSize(t.size);
    if (t.url) {
      audioPlayer.src = t.url;
      audioPlayer.load();
      renderFileList();
      playAudio();
    }
  }

  function deleteTrack(idx) {
    var t = tracks[idx];
    URL.revokeObjectURL(t.url);
    var was = idx === currentIndex;
    dbDelete(t.id);
    tracks.splice(idx, 1);
    if (tracks.length === 0) {
      currentIndex = -1;
      npTrack.textContent = "---";
      npArtist.textContent = "";
      audioPlayer.pause();
      audioPlayer.src = "";
     isPlaying = false;
      playBtn.innerHTML = '<span class="play-icon">&#9654;</span>';
     renderFileList();
      return;
    }
    if (was) {
      currentIndex = Math.min(currentIndex, tracks.length - 1);
      var nt = tracks[currentIndex];
      npTrack.textContent = nt.name;
      npArtist.textContent = fmtSize(nt.size);
      audioPlayer.src = nt.url;
      audioPlayer.load();
      if (isPlaying) playAudio();
    } else if (idx < currentIndex) {
      currentIndex--;
    }
    renderFileList();
  }

  function playAudio() {
    if (!audioPlayer.src) return;
    var ctx = getAudioContext();
    if (ctx.state === "suspended") ctx.resume();
    audioPlayer.play().then(function() {
      isPlaying = true;
      playBtn.innerHTML = '<span class="pause-bar"></span><span class="pause-bar"></span>';
    }).catch(function(e) {
      console.warn("Playback error:", e);
    });
  }

  function togglePlay() {
    if (currentIndex < 0 || tracks.length === 0) return;
    if (isPlaying) { audioPlayer.pause(); }
    else { playAudio(); }
  }

  function nextTrack() {
    if (tracks.length === 0) return;
    selectTrack((currentIndex + 1) % tracks.length);
  }

  function prevTrack() {
    if (tracks.length === 0) return;
    if (audioPlayer.currentTime > 3) { audioPlayer.currentTime = 0; return; }
    selectTrack((currentIndex - 1 + tracks.length) % tracks.length);
  }

  // === 音频上下文 + 可视化 ===
  var audioCtx = null;
  var analyser = null;

  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;
      try {
        var src = audioCtx.createMediaElementSource(audioPlayer);
        src.connect(analyser);
        analyser.connect(audioCtx.destination);
      } catch(e) {
        console.warn("Audio source already connected");
      }
    }
    return audioCtx;
  }

  // === Canvas 波浪可视化 ===
  var waveCanvas, waveCtx, wavePhase = 0;
  function resizeWaveCanvas() {
    if (!waveCanvas) return;
    var parent = waveCanvas.parentElement;
    waveCanvas.width = parent.clientWidth;
    waveCanvas.height = parent.clientHeight;
  }
  function initWaveCanvas() {
    waveCanvas = document.getElementById("waveCanvas");
    if (!waveCanvas) return;
    waveCtx = waveCanvas.getContext("2d");
    resizeWaveCanvas();
    window.addEventListener("resize", resizeWaveCanvas);
  }
  function drawWaves() {
    if (!waveCtx || !waveCanvas) return;
    var w = waveCanvas.width, h = waveCanvas.height;
    var midX = w / 2, midY = h / 2;
    waveCtx.clearRect(0, 0, w, h);
    var freqData = null;
    if (analyser && audioCtx && audioCtx.state !== "closed") {
      try {
        freqData = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(freqData);
      } catch(e) { }
    }
    wavePhase += 0.025;
    var layers = 6;
    var colorBase = [
      "232, 168, 124", "212, 132, 90", "180, 110, 75",
      "220, 180, 140", "200, 150, 110", "160, 120, 90"
    ];
   for (var l = 0; l < layers; l++) {
      var amp = 14 + l * 6;
     var freq = 0.012 + l * 0.007;
     var speed = 0.03 + l * 0.008;
     var alpha = Math.max(0.05, 0.3 - l * 0.035);
     var lineW = Math.max(1.5, 2.8 - l * 0.35);
     var mod = 1;
     if (freqData) {
       var fi = Math.floor((l / layers) * freqData.length * 0.6);
        mod = 0.15 + (freqData[fi] / 255) * 1.1;
     }
     var style = "rgba(" + colorBase[l] + "," + alpha + ")";
     waveCtx.beginPath();
     waveCtx.strokeStyle = style;
     waveCtx.lineWidth = lineW;
     for (var x = 0; x <= midX; x++) {
       var progress = x / midX;
       var env = Math.cos(progress * Math.PI * 0.45);
       var y = midY + Math.sin(x * freq + wavePhase * speed) * amp * env * mod
                   + Math.sin(x * 0.01 + wavePhase * 0.4) * 4;
       if (x === 0) waveCtx.moveTo(x, y);
       else waveCtx.lineTo(x, y);
     }
     waveCtx.stroke();
     waveCtx.beginPath();
     waveCtx.strokeStyle = style;
     for (var x = w; x >= midX; x--) {
       var progress = (w - x) / midX;
       var env = Math.cos(progress * Math.PI * 0.45);
       var y = midY + Math.sin((w - x) * freq + wavePhase * speed) * amp * env * mod
                   + Math.sin((w - x) * 0.01 + wavePhase * 0.4) * 4;
       if (x === w) waveCtx.moveTo(x, y);
       else waveCtx.lineTo(x, y);
     }
     waveCtx.stroke();
   }
  }
  function waveLoop() {
    drawWaves();
    requestAnimationFrame(waveLoop);
  }

  // === 音频事件 ===
  audioPlayer.addEventListener("timeupdate", function() {
    if (!audioPlayer.duration) return;
    progressFill.style.width = (audioPlayer.currentTime / audioPlayer.duration * 100) + "%";
    currentTimeEl.textContent = fmtTime(audioPlayer.currentTime);
  });

  audioPlayer.addEventListener("loadedmetadata", function() {
    totalTimeEl.textContent = fmtTime(audioPlayer.duration);
  });

  audioPlayer.addEventListener("ended", function() {
    if (currentPreviewId !== null) {
      currentPreviewId = null;
      var btns = document.querySelectorAll(".sr-play");
      btns.forEach(function(b) { b.classList.remove("playing"); b.textContent = "▶"; });
      return;
    }
    nextTrack();
  });
  audioPlayer.addEventListener("play", function() {
   isPlaying = true;
   playBtn.innerHTML = '<span class="pause-bar"></span><span class="pause-bar"></span>';
  });
  audioPlayer.addEventListener("pause", function() {
    isPlaying = false;
    playBtn.innerHTML = '<span class="play-icon">&#9654;</span>';
  });

  // === 控件事件 ===
  volumeSlider.addEventListener("input", function() {
    audioPlayer.volume = volumeSlider.value / 100;
  });
  audioPlayer.volume = volumeSlider.value / 100;

  progressBar.addEventListener("click", function(e) {
    if (!audioPlayer.duration) return;
    var rect = progressBar.getBoundingClientRect();
    audioPlayer.currentTime = ((e.clientX - rect.left) / rect.width) * audioPlayer.duration;
  });

  playBtn.addEventListener("click", togglePlay);
  nextBtn.addEventListener("click", nextTrack);
  prevBtn.addEventListener("click", prevTrack);

  document.addEventListener("keydown", function(e) {
    if (e.code === "Space") { e.preventDefault(); togglePlay(); }
    if (e.code === "ArrowRight") { e.preventDefault(); nextTrack(); }
    if (e.code === "ArrowLeft") { e.preventDefault(); prevTrack(); }
  });

  // === 上传事件 ===
  uploadZone.addEventListener("click", function() { fileInput.click(); });
  uploadZone.addEventListener("dragover", function(e) {
    e.preventDefault();
    uploadZone.classList.add("drag-over");
  });
  uploadZone.addEventListener("dragleave", function() {
    uploadZone.classList.remove("drag-over");
  });
  uploadZone.addEventListener("drop", function(e) {
    e.preventDefault();
    uploadZone.classList.remove("drag-over");
    processFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener("change", function() {
    processFiles(fileInput.files);
    fileInput.value = "";
  });

  // === 初始化：加载已存储的文件 ===
  function loadLibrary() {
    dbGetAll().then(function(items) {
      items.forEach(function(item) {
        if (item.blob instanceof Blob) {
          tracks.push({
            id: item.id,
            name: stripExt(item.name),
            size: item.size,
            url: URL.createObjectURL(item.blob),
            dur: 0
          });
        }
      });
      renderFileList();
      if (tracks.length > 0) {
        currentIndex = 0;
        var t = tracks[0];
        npTrack.textContent = t.name;
        npArtist.textContent = fmtSize(t.size);
        audioPlayer.src = t.url;
        totalTimeEl.textContent = "0:00";
      }
    }).catch(function(e) {
      console.error("Load library error:", e);
    });
  }


  // === 歌单系统 ===






  // === 启动 ===
  initWaveCanvas();
  loadLibrary();

  waveLoop();

  document.addEventListener("visibilitychange", function() {
    if (document.hidden && audioCtx) {
      audioCtx.suspend();
    } else if (!document.hidden && audioCtx && audioCtx.state === "suspended") {
      audioCtx.resume();
    }
  });
  document.getElementById("enterBtn").addEventListener("click", function() {
    document.getElementById("entryScreen").classList.add("hidden");
  });
  document.getElementById("recBtn").addEventListener("click", function() {
    if (tracks.length === 0) return;
    var idx = Math.floor(Math.random() * tracks.length);
    selectTrack(idx);
    document.getElementById("recBadge").classList.add("show");
  });

  // === 在线搜索 ===
  var currentPreviewId = null;

    function searchMusic(query) {
    var el = document.getElementById("searchResults");
    el.innerHTML = '<div class="sr-status">搜索中...</div>';
    fetch('/api/proxy?q=' + encodeURIComponent(query))
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        if (!data.data || data.data.length === 0) {
          el.innerHTML = '<div class="sr-status">未找到相关歌曲</div>';
          return;
        }
        renderSearchResults(data.data);
      })
      .catch(function() {
        el.innerHTML = '<div class="sr-status">搜索失败，请稍后重试</div>';
      });
  }
function renderSearchResults(items) {
    var el = document.getElementById("searchResults");
    var html = "";
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var cover = item.album.cover_medium || item.album.cover || "";
      var playing = (currentPreviewId === item.id);
      html += "<div class=\"sr-item\" data-id=\"" + item.id + "\" data-preview=\"" + (item.preview || "") + "\" data-title=\"" + escapeHtml(item.title) + "\" data-artist=\"" + escapeHtml(item.artist.name) + "\">";
      html += "<img class=\"sr-cover\" src=\"" + cover + "\" alt=\"\" loading=\"lazy\">";
      html += "<div class=\"sr-info\"><div class=\"sr-title\">" + escapeHtml(item.title) + "</div><div class=\"sr-artist\">" + escapeHtml(item.artist.name) + "</div></div>";
      html += "<button class=\"sr-play" + (playing ? " playing" : "") + "\">" + (playing ? "\u275a\u275a" : "\u25b6") + "</button></div>";
    }
    el.innerHTML = html;
  }

  document.getElementById("searchBtn").addEventListener("click", function() {
    var q = document.getElementById("searchInput").value.trim();
    if (q) searchMusic(q);
  });
  document.getElementById("searchInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") { var q = this.value.trim(); if (q) searchMusic(q); }
  });
  document.getElementById("searchResults").addEventListener("click", function(e) {
    var item = e.target.closest(".sr-item");
    if (!item) return;
    var btn = e.target.closest(".sr-play");
    if (!btn) return;
    var preview = item.dataset.preview;
    var id = item.dataset.id;
    var title = item.dataset.title;
    var artist = item.dataset.artist;
    if (!preview) return;
    if (currentPreviewId === id) {
      if (audioPlayer.paused) { audioPlayer.play(); btn.textContent = "\u275a\u275a"; }
      else { audioPlayer.pause(); btn.textContent = "\u25b6"; }
      return;
    }
    currentPreviewId = id;
    audioPlayer.src = preview;
    npTrack.textContent = title;
    npArtist.textContent = artist;
    audioPlayer.load();
    playAudio();
    var allBtns = document.querySelectorAll(".sr-play");
    allBtns.forEach(function(b) {
      b.classList.remove("playing");
      b.textContent = "\u25b6";
    });
    btn.classList.add("playing");
    btn.textContent = "\u275a\u275a";
  });

</script>
</body>
</html>
